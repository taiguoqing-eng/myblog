baseURL: "https://taigong.work/"
title: "TAIGONG WORK"
languageCode: "zh-cn"
theme: "PaperMod"

paginate: 10

enableRobotsTXT: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
  section:
    - HTML
    - RSS

params:
  env: production
  description: "技术博客 / AI / 安全 / 架构记录"
  author: "Taigong"

  defaultTheme: auto

  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  TocOpen: true
  ShowCodeCopyButtons: true
  ShowShareButtons: true
  ShowWordCount: true

  homeInfoParams:
    Title: "Taigong Work 👋"
    Content: "记录 AI、安全、架构与工程实践"

menu:
  main:
    - name: "首页"
      url: "/"
      weight: 1
    - name: "文章"
      url: "/posts/"
      weight: 2
    - name: "分类"
      url: "/categories/"
      weight: 3
    - name: "标签"
      url: "/tags/"
      weight: 4
    - name: "关于"
      url: "/about/"
      weight: 5