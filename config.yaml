baseURL: "https://www.taigong.work/"  # 建议加上 www，匹配你的主域名
title: "邰工的个人技术博客"
languageCode: "zh-cn"
theme: "PaperMod"

# 修复之前的淘汰参数（已将 paginate 改为新语法）
pagination:
  pagerSize: 10

enableRobotsTXT: true

# 补充：从 toml 合并过来的高级代码高亮配置
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: true
    theme: "monokai"
    goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
  page:
    - HTML
  section:
    - HTML
    - RSS

params:
  env: production
  description: "专注于网络安全、自动化运维与 IT 技术分享的个人博客。"
  author: "Taigong"
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    threshold: 0.4
    keys:
      - title
      - summary
      - content
  defaultTheme: auto

  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowToc: true
  TocOpen: true
  ShowCodeCopyButtons: true
  ShowShareButtons: true
  ShowWordCount: true

menu:
  main:
    - name: "首页"
      url: "/"
      weight: 1
    - name: "文章"
      url: "/posts/"
      weight: 2
    - name: "分类"
      url: "/categories/"
      weight: 3
    - name: "标签"
      url: "/tags/"
      weight: 4
    - name: "关于"
      url: "/about/"
      weight: 5
    - name: Search
      url: /search/
      weight: 6