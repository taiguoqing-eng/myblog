<!-- 左上角极客仪表盘（高可用静态图片流版本，免去外部 JS 拦截风险） -->
<div id="tech-top-dashboard" class="tech-top-dashboard">
    <span id="top-dashboard-time">0000-00-00 00:00:00</span>
    <span class="top-top-divider">|</span>
    <span id="top-dashboard-weather">Loading...</span>
</div>

<script>
// 1. 动态时间
function updateTopTime() {
    const now = new Date();
    document.getElementById('top-dashboard-time').innerText = 
        `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateTopTime, 1000);
updateTopTime();

// 2. 高可用天气 (直接 Fetch 文本，完全不依赖插件，无 CORS 限制)
function updateWeather() {
    fetch('https://wttr.in/?format=3') // 仅返回简短的天气文本
        .then(res => res.text())
        .then(text => {
            // 简单处理：去掉城市名，只留天气
            document.getElementById('top-dashboard-weather').innerText = text.split(':')[1] || text;
        })
        .catch(() => {
            document.getElementById('top-dashboard-weather').innerText = "Offline";
        });
}
updateWeather();
// 30分钟刷新一次天气
setInterval(updateWeather, 1800000);
</script>
