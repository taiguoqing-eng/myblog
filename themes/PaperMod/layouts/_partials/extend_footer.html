<div id="tech-dashboard" class="tech-dashboard">
    <span id="dashboard-time">0000-00-00 00:00:00</span>
    <span class="dashboard-divider">|</span>
    <span id="dashboard-weather">天气加载中...</span>
</div>

<script>
// 1. 动态时间逻辑
function updateDashboardTime() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    
    document.getElementById('dashboard-time').innerText = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}
setInterval(updateDashboardTime, 1000);
updateDashboardTime();

// 2. 免费轻量天气逻辑 (免 API Key 方案，自动根据 IP 定位)
function fetchWeather() {
    // 使用 wttr.in 的 JSON 接口，自适应 IP
    fetch('https://wttr.in/?format=%c+%t+%C')
        .then(response => response.text())
        .then(data => {
            if (data && !data.includes("Error")) {
                document.getElementById('dashboard-weather').innerText = data.trim();
            } else {
                document.getElementById('dashboard-weather').innerText = "📡 观测站离线";
            }
        })
        .catch(() => {
            document.getElementById('dashboard-weather').innerText = "⚡ 网络连接超时";
        });
}
// 初始化获取天气，每 15 分钟刷新一次
fetchWeather();
setInterval(fetchWeather, 900000);
</script>
