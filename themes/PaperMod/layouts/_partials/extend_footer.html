<div id="tech-top-dashboard" class="tech-top-dashboard">
    <span id="top-dashboard-time">0000-00-00 00:00:00</span>
    <span class="top-dashboard-divider">|</span>
    <div id="he-plugin-simple"></div>
</div>

<script>
// 1. 动态时间秒表
document.addEventListener("DOMContentLoaded", function() {
    const timeEl = document.getElementById('top-dashboard-time');
    if (timeEl) {
        function updateTopTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            timeEl.innerText = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateTopTime, 1000);
        updateTopTime();
    }
});
