<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- 使用 3.0.0 版本 -->
    <script src="https://unpkg.com/decap-cms@3.0.0/dist/decap-cms.js"></script>
  </head>
  <body>
    <script>
      // 捕获所有初始化错误，防止页面白屏
      try {
        CMS.init({
          config: {
            backend: {
              name: "github",
              repo: "taiguoqing-eng/myblog",
              branch: "main",
              auth_type: "implicit"
            },
            collections: [{
              name: "posts",
              label: "Blog",
              folder: "content/posts",
              create: true,
              fields: [{label: "Title", name: "title", widget: "string"}, {label: "Body", name: "body", widget: "markdown"}]
            }]
          }
        });
      } catch (e) {
        console.error("CMS init failed:", e);
        document.body.innerHTML = "<h1>CMS 加载失败，请检查控制台</h1>";
      }
    </script>
  </body>
</html>
