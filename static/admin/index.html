<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS</title>
</head>
<body>
    <!-- 1. 必须手动创建这个 div，CMS 才能挂载上去 -->
    <div id="nc-root"></div>

    <!-- 2. 使用 app 版本，它不带 Netlify 强制跳转 -->
    <script src="https://unpkg.com/decap-cms-app@3.0.0/dist/decap-cms-app.js"></script>

    <script>
        // 3. 必须在脚本加载后执行 init
        window.CMS_MANUAL_INIT = true;
        
        CMS.init({
            config: {
                backend: {
                    name: "github",
                    repo: "taiguoqing-eng/myblog",
                    branch: "main",
                    auth_type: "implicit"
                },
                media_folder: "static/images",
                public_folder: "/images",
                collections: [{
                    name: "posts",
                    label: "Posts",
                    folder: "content/posts",
                    create: true,
                    fields: [
                        {label: "Title", name: "title", widget: "string"},
                        {label: "Body", name: "body", widget: "markdown"}
                    ]
                }]
            }
        });
    </script>
</body>
</html>
